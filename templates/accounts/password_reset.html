{% extends "base.html" %}
{% block title %}Recuperar Senha{% endblock %}
{% block auth_content %}
<div class="auth-wrapper">
    <div class="card auth-card">
        <div class="card-header">
            <h4>Recuperar Senha</h4>
            <p class="text-muted">Informe seu e-mail cadastrado</p>
        </div>
        <div class="card-body px-4 pb-4">
            <form method="post">
                {% csrf_token %}
                <div class="mb-3">
                    <label class="form-label">E-mail</label>
                    {{ form.email }}
                </div>
                <button type="submit" class="btn btn-whatsapp w-100">Enviar Link</button>
            </form>
            <p class="text-center mt-3 mb-0">
                <a href="{% url 'accounts:login' %}">Voltar ao login</a>
            </p>
        </div>
    </div>
</div>
{% endblock %}
