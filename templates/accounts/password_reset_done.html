{% extends "base.html" %}
{% block title %}E-mail Enviado{% endblock %}
{% block auth_content %}
<div class="auth-wrapper">
    <div class="card auth-card">
        <div class="card-body text-center p-4">
            <i class="bi bi-envelope-check text-success" style="font-size:3rem"></i>
            <h4 class="mt-3">E-mail Enviado!</h4>
            <p class="text-muted">Verifique sua caixa de entrada para redefinir sua senha.</p>
            <a href="{% url 'accounts:login' %}" class="btn btn-whatsapp">Voltar ao Login</a>
        </div>
    </div>
</div>
{% endblock %}
