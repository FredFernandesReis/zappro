{% extends "base.html" %}
{% block title %}Excluir Resposta{% endblock %}
{% block page_title %}Excluir Resposta{% endblock %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-6">
        <div class="card table-card">
            <div class="card-body p-4 text-center">
                <i class="bi bi-exclamation-triangle text-warning" style="font-size:3rem"></i>
                <h4 class="mt-3">Confirmar Exclusão</h4>
                <p>Deseja excluir a resposta para <strong>"{{ resposta.palavra_chave }}"</strong>?</p>
                <form method="post" class="d-inline">
                    {% csrf_token %}
                    <button type="submit" class="btn btn-danger">Excluir</button>
                </form>
                <a href="{% url 'autorespostas:list' %}" class="btn btn-outline-secondary ms-2">Cancelar</a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
